name: Linux CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: linux-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, test, and package (${{ matrix.package_tag }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            package_tag: Ubuntu-24.04
          - runner: ubuntu-26.04
            package_tag: Ubuntu-26.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache
      PACKAGE_BASENAME: CacheExplorer-0.1.0-beta.3-${{ matrix.package_tag }}-x86_64

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Qt and build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes desktop-file-utils ninja-build qt6-base-dev

      - name: Create vcpkg binary cache directory
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        uses: actions/cache@v6
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ matrix.package_tag }}-x64-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.package_tag }}-x64-

      - name: Set up vcpkg at the manifest baseline
        run: |
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout f87344cac03158cbf1467264565f1fd36b382a24
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure, build, and test
        run: |
          cmake -S . -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCACHEEXPLORER_BUILD_QT_GUI=ON \
            -DCACHEEXPLORER_STATIC_MSVC_RUNTIME=OFF \
            -DCACHEEXPLORER_LINUX_PACKAGE_TAG="${{ matrix.package_tag }}"
          cmake --build build-linux
          ctest --test-dir build-linux --output-on-failure

      - name: Package Ubuntu application
        run: |
          cpack --config build-linux/CPackConfig.cmake \
            -G DEB \
            -B artifacts
          sha256sum "artifacts/$PACKAGE_BASENAME.deb" \
            > "artifacts/$PACKAGE_BASENAME.deb.sha256"

      - name: Test Ubuntu package
        run: |
          bash scripts/test-qt-linux-package.sh \
            "artifacts/$PACKAGE_BASENAME.deb"
          sha256sum --check \
            "artifacts/$PACKAGE_BASENAME.deb.sha256"

          sudo apt-get install --yes \
            "./artifacts/$PACKAGE_BASENAME.deb"
          version_output="$(QT_QPA_PLATFORM=offscreen CacheExplorer --version)"
          echo "$version_output"
          grep -q "0.1.0-beta.3" <<<"$version_output"

      - name: Upload Ubuntu package
        uses: actions/upload-artifact@v7
        with:
          name: CacheExplorer-${{ matrix.package_tag }}-x86_64
          path: |
            artifacts/${{ env.PACKAGE_BASENAME }}.deb
            artifacts/${{ env.PACKAGE_BASENAME }}.deb.sha256
          if-no-files-found: error
          retention-days: 14
